name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: ai_cfo_system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ai_cfo_system/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: |
          ruff check . --select E,F,W,I --ignore E501 --exclude .venv,node_modules

      - name: Syntax check — dashboard generators
        run: python -c "import dashboards.html_generators; print('OK: html_generators')"

      - name: Smoke test — math engine
        run: |
          python - << 'EOF'
          import sys
          sys.path.insert(0, ".")
          from backend.agents.math_engine import FinancialCalculationEngine
          eng = FinancialCalculationEngine()
          data = {
              "revenue": 10_000_000, "cogs": 3_000_000, "gross_profit": 7_000_000,
              "ebitda": 2_000_000, "ebit": 1_800_000, "net_income": 1_200_000,
              "total_assets": 20_000_000, "total_equity": 12_000_000,
              "current_assets": 8_000_000, "current_liabilities": 3_000_000,
              "cash": 4_000_000, "accounts_receivable": 2_000_000,
              "accounts_payable": 1_000_000, "inventory": 500_000,
              "total_debt": 5_000_000, "interest_expense": 200_000,
              "shares_outstanding": 1_000_000, "diluted_shares": 1_050_000,
              "tax_provision": 300_000, "pre_tax_income": 1_500_000,
          }
          kpis = eng.calculate_kpis(data)
          assert kpis["gross_margin_pct"] == 70.0, f"Expected 70.0, got {kpis['gross_margin_pct']}"
          assert kpis["current_ratio"] > 0
          assert kpis["net_margin_pct"] == 12.0
          print("OK: math engine — all assertions passed")
          EOF

      - name: Smoke test — GAAP + IFRS engines
        run: |
          python - << 'EOF'
          import sys
          sys.path.insert(0, ".")
          from backend.agents.math_engine import FinancialCalculationEngine
          from backend.compliance.gaap_engine import GAAPEngine
          from backend.compliance.ifrs_engine import IFRSEngine
          from data.sample_companies import COMPANIES

          eng  = FinancialCalculationEngine()
          gaap = GAAPEngine()
          ifrs = IFRSEngine()

          for key, data in COMPANIES.items():
              kpis     = eng.calculate_kpis(data)
              actuals  = {k: float(data[k]) for k in
                          ["revenue","cogs","gross_profit","ebitda","net_income"]
                          if k in data}
              variance = eng.calculate_variance_analysis(actuals, data.get("budget", {}))
              runway   = eng.calculate_cash_runway(data, kpis)
              g = gaap.check_all(data, kpis, variance, runway)
              i = ifrs.check_all(data, kpis, variance, runway)
              assert len(g) == 12, f"{key}: expected 12 GAAP checks, got {len(g)}"
              assert len(i) == 12, f"{key}: expected 12 IFRS checks, got {len(i)}"
              print(f"  OK: {data['_meta']['name']} — GAAP {sum(1 for v in g.values() if v.get('status')=='COMPLIANT')}/12  IFRS {sum(1 for v in i.values() if v.get('status')=='COMPLIANT')}/12")
          print("OK: GAAP + IFRS engines")
          EOF

      - name: Smoke test — dashboard generation (all 3 companies)
        run: |
          python - << 'EOF'
          import sys, os
          sys.path.insert(0, ".")
          import dashboards.html_generators as _gen
          from data.sample_companies import COMPANIES
          from backend.agents.math_engine import FinancialCalculationEngine
          from backend.compliance.gaap_engine import GAAPEngine
          from backend.compliance.ifrs_engine import IFRSEngine

          math_eng = FinancialCalculationEngine()
          gaap_eng = GAAPEngine()
          ifrs_eng = IFRSEngine()

          ACTUALS_KEYS = ["revenue","cogs","gross_profit","ebitda","ebit","net_income",
              "rd_expense","sg_a_expense","operating_expenses","interest_expense",
              "tax_provision","capex","free_cash_flow","depreciation_amortization"]

          rag_chunks = [
              {"title": "ASC 606", "content": "Revenue recognised when obligations satisfied."},
              {"title": "SAB 99",  "content": "5% materiality threshold."},
          ]

          generated = []
          for key, data in COMPANIES.items():
              co_dir = os.path.join("/tmp", key)
              os.makedirs(co_dir, exist_ok=True)
              actuals  = {k: float(data[k]) for k in ACTUALS_KEYS if k in data}
              kpis     = math_eng.calculate_kpis(data)
              variance = math_eng.calculate_variance_analysis(actuals, data.get("budget", {}))
              anomalies= math_eng.detect_anomalies(data, kpis)
              runway   = math_eng.calculate_cash_runway(data, kpis)
              forecast = math_eng.forecast_revenue(data.get("historical_revenue", []), 8)
              gaap     = gaap_eng.check_all(data, kpis, variance, runway)
              ifrs     = ifrs_eng.check_all(data, kpis, variance, runway)
              name, period = data["_meta"]["name"], data["_meta"]["period"]
              orig = _gen._ROOT
              _gen._ROOT = os.path.abspath(co_dir)
              p1 = _gen.generate_cfo_dashboard(data, kpis, variance, gaap, ifrs, forecast, runway, anomalies, rag_chunks, name, period)
              p2 = _gen.generate_cost_dashboard(data, kpis, name, period)
              p3 = _gen.generate_headcount_dashboard(data, kpis, name, period)
              p4 = _gen.generate_inventory_dashboard(data, kpis, name, period)
              _gen._ROOT = orig
              for p in [p1, p2, p3, p4]:
                  assert os.path.exists(p), f"Missing: {p}"
                  assert os.path.getsize(p) > 10_000, f"Too small: {p}"
              generated += [p1, p2, p3, p4]
              print(f"  OK: {name} — 4 dashboards written")

          print(f"OK: {len(generated)} dashboards generated, all verified")
          EOF

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --cov=backend --cov-report=term-missing \
            --ignore=tests/test_rag_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai_cfo_system/htmlcov/
          retention-days: 7
